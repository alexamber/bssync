name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-binaries:
    name: Build binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cli-asset: bssync-macos-arm64
            mcp-asset: bssync-mcp-macos-arm64
            dxt-platform: darwin
          - os: ubuntu-latest
            cli-asset: bssync-linux-x86_64
            mcp-asset: bssync-mcp-linux-x86_64
            dxt-platform: linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with build + MCP deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build,mcp]"

      - name: Build bssync onedir binary
        run: |
          pyinstaller --onedir --name bssync \
            --hidden-import bssync.init \
            --hidden-import bssync.discovery \
            --hidden-import bssync.sync \
            --hidden-import bssync.completions \
            src/bssync/__main__.py

      - name: Build bssync-mcp onedir binary
        # --collect-all mcp.server (not mcp) avoids recursing into mcp.cli,
        # which imports typer and is only used by the standalone `mcp` CLI
        # we don't ship.
        run: |
          pyinstaller --onedir --name bssync-mcp \
            --collect-all mcp.server \
            --collect-all pydantic \
            --hidden-import bssync.sync \
            --hidden-import bssync.discovery \
            --hidden-import bssync.mcp.server \
            --hidden-import bssync.mcp.tools.sync \
            --hidden-import bssync.mcp.tools.live_read \
            --hidden-import bssync.mcp.tools.live_write \
            --hidden-import bssync.mcp.resources \
            --hidden-import bssync.mcp.prompts \
            src/bssync/_mcp_entry.py

      - name: Smoke test binaries
        run: |
          ./dist/bssync/bssync --version
          ./dist/bssync-mcp/bssync-mcp --version

      - name: Package tarballs
        run: |
          tar -C dist/bssync -czf "${{ matrix.cli-asset }}.tar.gz" .
          tar -C dist/bssync-mcp -czf "${{ matrix.mcp-asset }}.tar.gz" .

      - name: Build Claude Desktop extension (.dxt)
        # A DXT is a zip of manifest.json + the bundled server. Claude
        # Desktop installs it with one click and prompts for the env vars
        # declared in user_config, so non-Python users skip the PATH +
        # JSON-editing dance entirely.
        env:
          VERSION_TAG: ${{ github.ref_name }}
          PLATFORM: ${{ matrix.dxt-platform }}
          DXT_ASSET: ${{ matrix.mcp-asset }}
        run: |
          VERSION="${VERSION_TAG#v}"
          rm -rf dxt-build
          mkdir -p dxt-build/server
          cp -R dist/bssync-mcp dxt-build/server/
          sed -e "s/__VERSION__/${VERSION}/g" \
              -e "s/__PLATFORM__/${PLATFORM}/g" \
              dxt/manifest.json.template > dxt-build/manifest.json
          (cd dxt-build && zip -qr "../${DXT_ASSET}.dxt" .)

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.cli-asset }}
          path: ${{ matrix.cli-asset }}.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.mcp-asset }}
          path: ${{ matrix.mcp-asset }}.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.mcp-asset }}-dxt
          path: ${{ matrix.mcp-asset }}.dxt

  publish-release:
    name: Publish GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          gh release create "$VERSION" \
            --title "bssync $VERSION" \
            --notes "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for release notes." \
            artifacts/*/bssync-*.tar.gz \
            artifacts/*/bssync-*.dxt

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: publish-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute checksums
        id: sha
        run: |
          MACOS_SHA=$(sha256sum artifacts/bssync-macos-arm64/bssync-macos-arm64.tar.gz | awk '{print $1}')
          LINUX_SHA=$(sha256sum artifacts/bssync-linux-x86_64/bssync-linux-x86_64.tar.gz | awk '{print $1}')
          echo "macos_sha=$MACOS_SHA" >> "$GITHUB_OUTPUT"
          echo "linux_sha=$LINUX_SHA" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: alexamber/homebrew-bssync
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Regenerate formula
        env:
          VERSION_TAG: ${{ github.ref_name }}
          MACOS_SHA: ${{ steps.sha.outputs.macos_sha }}
          LINUX_SHA: ${{ steps.sha.outputs.linux_sha }}
        run: |
          VERSION="${VERSION_TAG#v}"
          cat > tap/Formula/bssync.rb <<EOF
          class Bssync < Formula
            desc "Two-way sync between local markdown files and a BookStack wiki"
            homepage "https://github.com/alexamber/bssync"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/alexamber/bssync/releases/download/${VERSION_TAG}/bssync-macos-arm64.tar.gz"
                sha256 "${MACOS_SHA}"

                def install
                  libexec.install Dir["*"]
                  bin.install_symlink libexec/"bssync"
                end
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/alexamber/bssync/releases/download/${VERSION_TAG}/bssync-linux-x86_64.tar.gz"
                sha256 "${LINUX_SHA}"

                def install
                  libexec.install Dir["*"]
                  bin.install_symlink libexec/"bssync"
                end
              end
            end

            test do
              assert_match "bssync #{version}", shell_output("#{bin}/bssync --version")
            end
          end
          EOF

      - name: Commit and push
        working-directory: tap
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/bssync.rb
          if git diff --staged --quiet; then
            echo "No formula changes — already up to date."
            exit 0
          fi
          git commit -m "Update bssync to ${VERSION_TAG}"
          git push
